# Default Bunny Video blueprint
# To customize, create your own site/blueprints/files/bunny-video.yml:
#
# extends: files/bunny-video-fields
# title: My Video
# fields:
#   caption:
#     type: text

extends: files/bunny-video-fields

title: Bunny Video

options:
  changeName: true
  duplicate: true

image:
  src: "{{ file.bunnyThumbnail }}"
  icon: loader
  cover: true
  back: orange-500
  color: black

accept:
  mime:
    - video/*
    - image/*

fields:
  customthumbnail:
    type: files
    label: Custom Thumbnail
    help: Override the auto-generated thumbnail
    max: 1
    image:
      cover: true
    uploads:
      template: image
